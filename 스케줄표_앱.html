<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 스케줄표 · 수학 영어 물리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0E5C3F; --green-deep:#0A4530; --green-soft:#EAF2ED;
  --paper:#F7F2E7; --card:#FFFFFF; --ink:#23302A; --muted:#8B8474;
  --line:#E4DCC9; --gold:#B8862B; --gold-soft:#FBF3E1; --gold-deep:#8A6516;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--paper);color:var(--ink);padding:24px 16px 64px}
.wrap{max-width:960px;margin:0 auto}

.brand{font-family:'Fraunces',serif;font-weight:700;font-size:13px;letter-spacing:.22em;color:var(--green);margin-bottom:10px}
h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:13.5px;margin-top:6px}
.sub b{color:var(--ink);font-weight:600}

/* ── subject tabs ── */
.tabs{display:flex;gap:8px;margin:18px 0 14px;flex-wrap:wrap}
.tab{flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;cursor:pointer;text-align:left;font-family:inherit;transition:border-color .12s}
.tab:hover{border-color:var(--muted)}
.tab .t-name{font-weight:700;font-size:15px}
.tab .t-pct{font-family:'Fraunces',serif;font-weight:700;font-size:15px;color:var(--muted);float:right}
.tab .t-bar{height:6px;background:var(--green-soft);border-radius:99px;overflow:hidden;margin-top:9px}
.tab .t-bar i{display:block;height:100%;width:0;background:var(--green);border-radius:99px;transition:width .3s}
.tab.on{background:var(--green);border-color:var(--green)}
.tab.on .t-name{color:#fff}
.tab.on .t-pct{color:rgba(255,255,255,.85)}
.tab.on .t-bar{background:rgba(255,255,255,.25)}
.tab.on .t-bar i{background:#fff}

/* ── board ── */
.board{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:0 0 22px;
  display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.subline{width:100%;color:var(--muted);font-size:13px;margin:-2px 0 2px}
.subline b{color:var(--ink);font-weight:600}
.stat{min-width:96px}
.stat .num{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--green);line-height:1}
.stat .num small{font-size:14px;color:var(--muted);font-weight:600}
.stat .lab{font-size:11.5px;color:var(--muted);margin-top:4px;letter-spacing:.04em}
.barbox{flex:1;min-width:220px}
.bar{height:10px;background:var(--green-soft);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:var(--green);border-radius:99px;transition:width .35s ease}
.bar-lab{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:6px}
.reset{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;
  font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer}
.reset:hover{border-color:var(--muted);color:var(--ink)}

/* ── table ── */
.scroll{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:14px}
table{width:100%;min-width:760px;border-collapse:collapse;font-size:13.5px}
thead th{position:sticky;top:0;background:var(--card);color:var(--muted);font-size:11.5px;font-weight:600;
  letter-spacing:.06em;text-align:left;padding:12px 10px;border-bottom:2px solid var(--green);z-index:2}
thead th.c{text-align:center}

tr.unit td{background:var(--green);color:#fff;padding:9px 12px;font-weight:600;font-size:13px}
tr.unit .day{font-family:'Fraunces',serif;font-weight:700;letter-spacing:.08em;font-size:12px;
  background:rgba(255,255,255,.16);border-radius:6px;padding:2px 8px;margin-right:10px}
tr.unit .meta{float:right;font-weight:500;font-size:12px;opacity:.85}
tr.unit .done-badge{float:right;margin-left:12px;font-size:11.5px;font-weight:700;background:#fff;color:var(--green);
  border-radius:99px;padding:2px 9px}
tr.unit .done-badge.zero{background:rgba(255,255,255,.16);color:#fff;font-weight:500}

tbody td{padding:9px 10px;border-bottom:1px solid #F0EADB;vertical-align:middle}
td.id{font-family:'Fraunces',serif;font-weight:600;color:var(--muted);white-space:nowrap;width:52px}
td.pg,td.tm{white-space:nowrap;color:var(--muted);font-size:12.5px}
td.c{text-align:center}
.k{display:inline-block;font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px;white-space:nowrap}
.k.c{background:var(--green-soft);color:var(--green)}
.k.p{background:var(--gold-soft);color:var(--gold-deep)}
tr.lesson.full{background:#F4F8F5}
tr.lesson.full td.id{color:var(--green)}
tr.lesson.full td.title{color:var(--green-deep)}

input[type=date]{font-family:inherit;font-size:12px;color:var(--ink);border:1px solid var(--line);
  border-radius:7px;padding:4px 6px;background:#FDFBF6;width:128px}
input[type=date]:focus{outline:2px solid var(--green-soft);border-color:var(--green)}

input[type=checkbox]{appearance:none;width:20px;height:20px;border:1.8px solid var(--line);border-radius:6px;
  cursor:pointer;vertical-align:middle;position:relative;background:#fff;transition:all .12s}
input[type=checkbox]:hover{border-color:var(--muted)}
input[type=checkbox]:checked::after{content:'';position:absolute;left:5.5px;top:2px;width:5px;height:10px;
  border:solid #fff;border-width:0 2.2px 2.2px 0;transform:rotate(45deg)}
input.c1:checked{background:var(--gold);border-color:var(--gold)}
input.c2:checked{background:var(--green);border-color:var(--green)}

.foot{color:var(--muted);font-size:11.5px;margin-top:14px;text-align:right}
@media (max-width:640px){
  body{padding:16px 10px 48px}
  h1{font-size:21px}
  .board{padding:14px;gap:12px}
  .reset{margin-left:0}
  .tab{min-width:100px;padding:10px 12px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">AXISOLVE</div>
  <h1>학습 스케줄표</h1>
  <div class="sub">수학 · 영어 · 물리 &nbsp;|&nbsp; 총 <b>176차시</b> · 5,964분 (99시간 24분)</div>

  <div class="tabs" id="tabs"></div>

  <div class="board">
    <div class="subline" id="subline"></div>
    <div class="stat"><div class="num" id="s1">0</div><div class="lab">체크 1 완료</div></div>
    <div class="stat"><div class="num" id="s2">0</div><div class="lab">체크 2 완료</div></div>

    <button class="reset" id="resetBtn">기록 초기화</button>
  </div>

  <div class="scroll">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>

const states = {};
for (const id in SUBJECTS) {
  try { states[id] = JSON.parse(localStorage.getItem(SUBJECTS[id].key)) || {}; }
  catch(e) { states[id] = {}; }
}
const getRec = (sid, lid) => states[sid][lid] || (states[sid][lid] = {d:'', c1:0, c2:0});
const save = sid => localStorage.setItem(SUBJECTS[sid].key, JSON.stringify(states[sid]));
const lessonCount = sid => SUBJECTS[sid].data.reduce((a,u) => a + u.lessons.length, 0);

let current = localStorage.getItem('sched-app-tab');
if (!SUBJECTS[current]) current = 'math';

/* ── tabs ── */
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = Object.keys(SUBJECTS).map(id => `
  <button class="tab" data-sid="${id}">
    <span class="t-name">${SUBJECTS[id].name}</span><span class="t-pct" id="tp-${id}">0%</span>
    <div class="t-bar"><i id="tb-${id}"></i></div>
  </button>`).join('');
tabsEl.addEventListener('click', e => {
  const b = e.target.closest('.tab');
  if (!b) return;
  current = b.dataset.sid;
  localStorage.setItem('sched-app-tab', current);
  renderSubject();
});

function subjectPct(sid) {
  let n1 = 0, n2 = 0;
  for (const u of SUBJECTS[sid].data) for (const l of u.lessons) {
    const r = states[sid][l.id];
    if (r && r.c1) n1++;
    if (r && r.c2) n2++;
  }
  return { n1, n2, pct: Math.round((n1 + n2) / (lessonCount(sid) * 2) * 100) };
}
function refreshTabs() {
  for (const id in SUBJECTS) {
    const p = subjectPct(id);
    document.getElementById('tp-' + id).textContent = p.pct + '%';
    document.getElementById('tb-' + id).style.width = p.pct + '%';
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.sid === current));
}

/* ── subject view ── */
const thead = document.getElementById('thead');
const tbody = document.getElementById('tbody');

function renderSubject() {
  const S = SUBJECTS[current];
  document.getElementById('subline').innerHTML = S.sub;
  thead.innerHTML = S.mode === 'kind'
    ? `<tr><th>차시</th><th class="c">구분</th><th>학습 내용</th><th>시간</th>
       <th class="c">날짜</th><th class="c">체크 1</th><th class="c">체크 2</th></tr>`
    : `<tr><th>차시</th><th>학습 내용</th><th>페이지</th><th>시간</th>
       <th class="c">날짜</th><th class="c">체크 1</th><th class="c">체크 2</th></tr>`;

  const frag = [];
  for (const u of S.data) {
    frag.push(`<tr class="unit"><td colspan="7">
      <span class="day">DAY ${u.day}</span>${u.unit}
      <span class="done-badge zero" id="badge-${u.day}">0/${u.lessons.length}</span>
      <span class="meta">${u.pages} · ${u.total}분</span></td></tr>`);
    for (const l of u.lessons) {
      const r = getRec(current, l.id);
      const mid = S.mode === 'kind'
        ? `<td class="id">${l.no}</td>
           <td class="c"><span class="k ${l.kind === '개념' ? 'c' : 'p'}">${l.kind}</span></td>
           <td class="title">${l.title}</td>`
        : `<td class="id">${l.id}</td>
           <td class="title">${l.title}</td>
           <td class="pg">${l.pages}</td>`;
      frag.push(`<tr class="lesson" data-id="${l.id}" data-day="${u.day}">${mid}
        <td class="tm">${l.min}분</td>
        <td class="c"><input type="date" value="${r.d}" data-id="${l.id}"></td>
        <td class="c"><input type="checkbox" class="c1" data-id="${l.id}" ${r.c1?'checked':''}></td>
        <td class="c"><input type="checkbox" class="c2" data-id="${l.id}" ${r.c2?'checked':''}></td>
      </tr>`);
    }
  }
  tbody.innerHTML = frag.join('');
  refreshBoard();
}

function refreshBoard() {
  const S = SUBJECTS[current];
  const N = lessonCount(current);
  const perDay = {};
  for (const u of S.data) perDay[u.day] = 0;
  let n1 = 0, n2 = 0;
  for (const u of S.data) for (const l of u.lessons) {
    const r = getRec(current, l.id);
    if (r.c1) n1++;
    if (r.c2) n2++;
    const row = tbody.querySelector(`tr.lesson[data-id="${l.id}"]`);
    if (row) row.classList.toggle('full', !!(r.c1 && r.c2));
    if (r.c1 && r.c2) perDay[u.day]++;
  }
  document.getElementById('s1').innerHTML = n1 + `<small>/${N}</small>`;
  document.getElementById('s2').innerHTML = n2 + `<small>/${N}</small>`;
  const pct = Math.round((n1 + n2) / (N * 2) * 100);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  for (const u of S.data) {
    const b = document.getElementById('badge-' + u.day);
    if (!b) continue;
    b.textContent = perDay[u.day] + '/' + u.lessons.length;
    b.classList.toggle('zero', perDay[u.day] === 0);
  }
  refreshTabs();
}

tbody.addEventListener('change', e => {
  const id = e.target.dataset.id;
  if (!id) return;
  const r = getRec(current, id);
  if (e.target.type === 'date') r.d = e.target.value;
  else if (e.target.classList.contains('c1')) r.c1 = e.target.checked ? 1 : 0;
  else if (e.target.classList.contains('c2')) r.c2 = e.target.checked ? 1 : 0;
  save(current); refreshBoard();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm(SUBJECTS[current].name + ' 과목의 체크와 날짜 기록을 초기화할까요?')) return;
  states[current] = {}; save(current);
  renderSubject();
});

renderSubject();
</script>
